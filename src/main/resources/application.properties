spring.application.name=LunchBot
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lunch_bot_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.flyway.enabled=true

# --- Telegram ---
telegram.bot-token=${TELEGRAM_BOT_TOKEN}
# username бот узнаёт сам через getMe

# --- Куда слать чеки на ручную проверку ---
lunch.admin-chat-id=${LUNCH_ADMIN_CHAT_ID}

# --- Чеки ---
# Реквизит получателя живёт в БД (таблица app_setting), меняется командой /recipient.
# 0 = только сегодняшний чек, 1 = принимать и вчерашний
lunch.receipt.back-days=${LUNCH_RECEIPT_BACK_DAYS:1}

# --- Цены ---
# Столовая берёт за порцию:
lunch.price.canteen=${LUNCH_PRICE_CANTEEN:260}
# Обычная цена для человека и льготная:
lunch.price.default=${LUNCH_PRICE_DEFAULT:270}
lunch.price.reduced=${LUNCH_PRICE_REDUCED:260}
# id тех, кто платит 240 (через запятую). Остальные — 250:
lunch.price.reduced-users=${LUNCH_PRICE_REDUCED_USERS:8550001494,8765481879,1209071685,5758970130,1002611217}
# Бесплатное блюдо привязано к получателю (recipient.id в БД, задаётся /recipient),
# а не к конфигу.
lunch.ocr.datapath=${LUNCH_OCR_DATAPATH:/usr/share/tesseract-ocr/5/tessdata}

logging.level.com.example.lunchbot=INFO
